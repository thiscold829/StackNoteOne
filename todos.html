<script>
// [수술 완료] 로컬 스토리지 간섭 방지 및 Config 1순위 강제 적용
const S_ID = (typeof CONFIG !== 'undefined' && CONFIG.SHEET_ID) ? CONFIG.SHEET_ID : (localStorage.getItem('CUSTOM_SHEET_ID') || '16izs14p3VvDfojdBR2Q3Qwty6wHZiRqNbnQ8PxS9eOY');
const A_URL = (typeof CONFIG !== 'undefined' && CONFIG.API_URL) ? CONFIG.API_URL : (localStorage.getItem('CUSTOM_API_URL') || 'https://script.google.com/macros/s/AKfycbz6QmihPORS0zp7Z9KPcHfAOVqGYlUVAl982rPZEW3sUcBtpe8OJDMxwrT67pA4ogO9/exec');

let projects = [], todos = [], currentTab = 'active', autoSaveTimer;

window.onload = async () => {
  try {
    const [pRes, tRes] = await Promise.all([
      fetch(`https://docs.google.com/spreadsheets/d/${S_ID}/gviz/tq?tqx=out:csv&sheet=projects`),
      fetch(`https://docs.google.com/spreadsheets/d/${S_ID}/gviz/tq?tqx=out:csv&sheet=todos`)
    ]);
    projects = parseCSV(await pRes.text()) || [];
    todos = parseCSV(await tRes.text()) || [];
    
    // 빈 데이터 방어
    if (!Array.isArray(projects)) projects = [];
    if (!Array.isArray(todos)) todos = [];
    
    initProjUI(); renderTodos();
  } catch(e) { console.error("DB Load Error", e); document.getElementById('listPool').innerHTML = '<div class="text-center text-rose-500 font-bold mt-12 opacity-60">데이터 로드 실패</div>'; }
};

function parseCSV(t){
  if (!t || typeof t !== 'string') return [];
  const lines=t.trim().split('\n'); if(lines.length<2) return [];
  const hdrs=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).map(l=>{
    const v=[]; let c='', q=false;
    for(let i=0; i<l.length; i++){ const ch=l[i]; if(ch==='"') q=!q; else if(ch===','&&!q){v.push(c.trim());c='';} else c+=ch; }
    v.push(c.trim()); const o={}; hdrs.forEach((h,i)=>o[h]=(v[i]||'').replace(/^"|"$/g,'')); return o;
  });
}

function initProjUI() {
  document.getElementById('projList').innerHTML = projects.map(p=>`<option value="${p.short_name}">${p.full_name}</option>`).join('');
}

function setSyncStatus(state) {
  const btn = document.getElementById('saveBtn');
  const ico = document.getElementById('syncIcon');
  const txt = document.getElementById('syncText');
  if (state === 'syncing') {
    btn.classList.add('syncing');
    ico.textContent = 'sync'; ico.classList.add('animate-spin');
    txt.textContent = '동기화 중...';
  } else {
    btn.classList.remove('syncing');
    ico.textContent = 'cloud_done'; ico.classList.remove('animate-spin');
    txt.textContent = 'DB 동기화 완료';
  }
}

function triggerAutoSave(immediate = false) {
  clearTimeout(autoSaveTimer);
  setSyncStatus('syncing');
  if (immediate) commitToCloud();
  else autoSaveTimer = setTimeout(commitToCloud, 1500);
}

function forceManualSave() {
  if (window.isSaving) return;
  showToast("수동 동기화를 시작합니다.");
  triggerAutoSave(true);
}

function commitToCloud() {
  if(window.isSaving) return;
  
  // [수술 유지] 정확한 6개 컬럼(id, task, project_id, deadline, is_done, memo) 매핑
  const safeTodos = todos.map(t => ({
    id: t.id || t.ID || '',
    task: t.task || t.Task || '',
    project_id: t.project_id || t.Project_id || t['Project ID'] || '',
    deadline: t.deadline || t.Deadline || '',
    is_done: t.is_done || t.Is_done || 'FALSE',
    memo: t.memo || t.Memo || ''
  }));

  const payload = { action: 'write', sheetName: 'todos', data: safeTodos };
  document.getElementById('payload_input').value = JSON.stringify(payload);
  
  window.isSaving = true;
  document.getElementById('hidden_form').action = A_URL;
  document.getElementById('hidden_form').submit();
}

function onSaveSuccess() {
  window.isSaving = false;
  setSyncStatus('done');
}

function renderTodos() {
  const pool = document.getElementById('listPool');
  const today = new Date().toISOString().split('T')[0];
  let filtered = todos.filter(t => currentTab === 'active' ? String(t.is_done).toUpperCase() !== 'TRUE' : String(t.is_done).toUpperCase() === 'TRUE');
  
  if(!filtered.length) { pool.innerHTML = `<div class="text-center text-slate-400 font-bold mt-12 opacity-60">항목이 없습니다.</div>`; return; }

  const grouped = {};
  filtered.forEach(t => { const pid = t.project_id || 'GENERAL'; if(!grouped[pid]) grouped[pid] = []; grouped[pid].push(t); });

  let html = '';
  // 그룹 정렬 (project order 기반)
  const sortedKeys = Object.keys(grouped).sort((a,b) => {
    let idxA = projects.findIndex(p => p.short_name === a);
    let idxB = projects.findIndex(p => p.short_name === b);
    idxA = idxA === -1 ? 999 : idxA;
    idxB = idxB === -1 ? 999 : idxB;
    return idxA - idxB;
  });

  sortedKeys.forEach(k => {
    // 항목별 정렬: 가까운 날짜 순 -> 같으면 가나다 순
    grouped[k].sort((a,b) => {
      let dA = a.deadline || '9999-99-99';
      let dB = b.deadline || '9999-99-99';
      if(dA !== dB) return dA.localeCompare(dB);
      return (a.task || '').localeCompare(b.task || '');
    });

    html += `<div class="group-header"><span class="group-label">${k}</span><div class="group-line"></div></div>`;
    grouped[k].forEach(t => {
      const isOver = t.deadline && t.deadline <= today && currentTab === 'active';
      html += `
        <div class="task-card ${currentTab==='done'?'done':''}" onclick="openEdit('${t.id}')">
          <div class="checkbox" onclick="event.stopPropagation(); toggleDone('${t.id}')"></div>
          <div class="task-txt">${t.task} ${t.memo?'<span class="ms text-slate-300 text-[14px] ml-1">sticky_note_2</span>':''}</div>
          ${t.deadline ? `<div class="text-[12px] font-bold ${isOver?'text-rose-500':'text-slate-400'} font-['Space_Grotesk']">${t.deadline.slice(5).replace('-','/')}</div>` : ''}
          ${isOver ? `<div class="w-1.5 h-1.5 bg-rose-500 rounded-full shadow-[0_0_8px_rgba(244,63,94,0.6)] ml-1"></div>`:''}
        </div>`;
    });
  });
  pool.innerHTML = html;
}

function switchTab(t) { currentTab = t; document.getElementById('tabActive').classList.toggle('active', t==='active'); document.getElementById('tabDone').classList.toggle('active', t==='done'); renderTodos(); }

function addTodo() {
  const t = document.getElementById('inTask').value.trim(); if(!t) return;
  todos.push({
    id: 't_' + Date.now(), 
    project_id: document.getElementById('inProj').value.trim(), 
    task: t, 
    deadline: document.getElementById('inDate').value, 
    is_done: 'FALSE', 
    memo: ''
  });
  document.getElementById('inTask').value=''; renderTodos(); triggerAutoSave(true);
}

function toggleDone(id) { 
  const idx = todos.findIndex(x => String(x.id) === String(id)); 
  if(idx > -1) {
    todos[idx].is_done = String(todos[idx].is_done).toUpperCase()==='TRUE' ? 'FALSE' : 'TRUE'; 
    renderTodos(); triggerAutoSave(true); 
  }
}

function openEdit(id) {
  const t = todos.find(x => String(x.id) === String(id));
  if(t) {
    document.getElementById('edId').value = t.id; 
    document.getElementById('edProj').value = t.project_id || ''; 
    document.getElementById('edTask').value = t.task; 
    document.getElementById('edDate').value = t.deadline || ''; 
    document.getElementById('edMemo').value = (t.memo || '').replace(/↵/g, '\n'); 
    document.getElementById('editModal').classList.add('active');
  }
}

function closeEdit() { document.getElementById('editModal').classList.remove('active'); }

function saveEdit() {
  const id = document.getElementById('edId').value; 
  const idx = todos.findIndex(x => String(x.id) === String(id));
  if(idx > -1) {
    todos[idx] = {
      id: id,
      task: document.getElementById('edTask').value.trim(),
      project_id: document.getElementById('edProj').value.trim(),
      deadline: document.getElementById('edDate').value,
      is_done: todos[idx].is_done,
      memo: document.getElementById('edMemo').value.replace(/\n/g, '↵') 
    };
    closeEdit(); renderTodos(); triggerAutoSave(true);
  }
}

function deleteTodo() { 
  const id = document.getElementById('edId').value;
  todos = todos.filter(x => String(x.id) !== String(id)); 
  closeEdit(); renderTodos(); triggerAutoSave(true); 
}

function showToast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
