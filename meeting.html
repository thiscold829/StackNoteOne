<script>
// [수술 1] 정상 작동 중인 다른 모듈과 동일한 Config 규칙 강제 (로컬 스토리지 간섭 완벽 차단)
const S_ID = typeof CONFIG !== 'undefined' ? CONFIG.SHEET_ID : '16izs14p3VvDfojdBR2Q3Qwty6wHZiRqNbnQ8PxS9eOY';
const A_URL = typeof CONFIG !== 'undefined' ? CONFIG.API_URL : 'https://script.google.com/macros/s/AKfycbz6QmihPORS0zp7Z9KPcHfAOVqGYlUVAl982rPZEW3sUcBtpe8OJDMxwrT67pA4ogO9/exec';

let projects = [], members = [], meetings = [];

window.onload = async () => {
  try {
    const [pRes, mRes, mtRes] = await Promise.all([
      fetch(`https://docs.google.com/spreadsheets/d/${S_ID}/gviz/tq?tqx=out:csv&sheet=projects`),
      fetch(`https://docs.google.com/spreadsheets/d/${S_ID}/gviz/tq?tqx=out:csv&sheet=members`),
      fetch(`https://docs.google.com/spreadsheets/d/${S_ID}/gviz/tq?tqx=out:csv&sheet=meetings`)
    ]);
    projects = parseCSV(await pRes.text()) || [];
    members = parseCSV(await mRes.text()) || [];
    meetings = mtRes.ok ? (parseCSV(await mtRes.text()) || []) : [];
    initUI();
  } catch(e) { console.error(e); document.getElementById('listPool').innerHTML = '<div class="text-center text-rose-500 font-bold mt-20">데이터 로드 실패. API 연동을 확인하세요.</div>';}
};

function parseCSV(t){
  const lines=t.trim().split('\n'); if(lines.length<2) return [];
  const hdrs=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).map(l=>{
    const v=[]; let c='', q=false;
    for(let i=0; i<l.length; i++){ const ch=l[i]; if(ch==='"') q=!q; else if(ch===','&&!q){v.push(c.trim());c='';} else c+=ch; }
    v.push(c.trim()); const o={}; hdrs.forEach((h,i)=>o[h]=(v[i]||'').replace(/^"|"$/g,'')); return o;
  });
}

function initUI() {
  document.getElementById('edProj').innerHTML = '<option value="">사업 선택</option>' + projects.map(p=>`<option value="${p.short_name}">${p.short_name}</option>`).join('');
  document.getElementById('edMemGrid').innerHTML = members.map((m, i) => `
    <label>
      <input type="checkbox" class="mem-chk" value="${m.name}" id="chkMem_${i}">
      <div class="mem-lbl">${m.name}</div>
    </label>
  `).join('');
  renderList();
}

/* --- List View Logic --- */
function groupMeetings() {
  const map = {};
  meetings.forEach(m => {
    const p = m.project_id || '기타';
    if(!map[p]) map[p] = [];
    map[p].push(m);
  });
  return Object.keys(map).sort((a,b) => {
    const pA = projects.find(p=>p.short_name === a), pB = projects.find(p=>p.short_name === b);
    return (pA ? Number(pA.order) : 999) - (pB ? Number(pB.order) : 999);
  }).map(proj => {
    map[proj].sort((a,b) => (b.date||'').localeCompare(a.date||''));
    return { proj, items: map[proj] };
  });
}

function renderList() {
  const pool = document.getElementById('listPool');
  if(!meetings.length) { pool.innerHTML = '<div class="text-center text-slate-400 font-bold mt-20 opacity-60">등록된 회의록이 없습니다.</div>'; return; }
  
  const grouped = groupMeetings();
  let html = '';
  grouped.forEach(g => {
    html += `
      <div class="proj-group">
        <div class="proj-header">
          <div class="text-slate-800">[${g.proj}]</div>
          <div class="text-[12px] font-bold text-slate-400 bg-slate-50 border border-slate-100 px-3 py-1 rounded-full">${g.items.length} Meetings</div>
        </div>
        <div class="meet-grid">
    `;
    g.items.forEach(m => {
      let dStr = (m.date||'').replace('T', ' ').slice(0, 16);
      
      let pDisplay = m.participants || '';
      pDisplay = pDisplay.replace(/\[내부\]|\[외부\]/g, '').replace(/\|/g, ',').trim();
      if(pDisplay.startsWith(',')) pDisplay = pDisplay.substring(1).trim();

      html += `
        <div class="meet-card" onclick="openEditor('${m.id}')">
          <div class="m-date">${dStr}</div>
          <div class="m-title">${m.title || '제목 없음'}</div>
          <div class="m-parts">${pDisplay ? '참석: ' + pDisplay : '참석자 없음'}</div>
        </div>
      `;
    });
    html += `</div></div>`;
  });
  pool.innerHTML = html;
}

/* --- Editor Logic --- */
function openEditor(id) {
  document.getElementById('viewList').style.display = 'none';
  document.getElementById('viewEditor').style.display = 'flex';
  
  document.getElementById('edId').value = '';
  const now = new Date();
  now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
  document.getElementById('edDate').value = now.toISOString().slice(0,16);
  document.getElementById('edProj').value = '';
  document.getElementById('edTitle').value = '';
  document.getElementById('edNote').value = '';
  document.getElementById('edActions').value = '';
  document.getElementById('edTrans').value = '';
  document.querySelectorAll('.mem-chk').forEach(cb => cb.checked = false);

  if(id) {
    // 식별자 대소문자 호환을 위한 매핑
    const m = meetings.find(x => String(x.id||x.ID) === String(id));
    if(m) {
      document.getElementById('edId').value = m.id || m.ID;
      document.getElementById('edDate').value = m.date || m.Date || '';
      document.getElementById('edProj').value = m.project_id || m.Project_id || m['Project ID'] || '';
      document.getElementById('edTitle').value = m.title || m.Title || '';
      document.getElementById('edNote').value = (m.note || m.Note || '').replace(/↵/g, '\n');
      document.getElementById('edActions').value = (m.actions || m.Actions || '').replace(/↵/g, '\n');
      document.getElementById('edTrans').value = (m.transcript || m.Transcript || '').replace(/↵/g, '\n');
      
      let pStr = m.participants || m.Participants || "";
      let inMatch = pStr.match(/\[내부\](.*?)(?=\| \[외부\]|$)/);
      let extMatch = pStr.match(/\[외부\](.*)/);
      
      if(inMatch && inMatch[1]) {
        let inList = inMatch[1].split(',').map(s=>s.trim());
        inList.forEach(pt => {
          document.querySelectorAll('.mem-chk').forEach(cb => { if(cb.value === pt) cb.checked = true; });
        });
      }
      if(extMatch && extMatch[1]) {
        document.getElementById('edExt').value = extMatch[1].trim();
      }
    }
  }
}

function closeEditor() { 
  document.getElementById('viewEditor').style.display = 'none'; 
  document.getElementById('viewList').style.display = 'flex';
}

function saveMeeting() {
  const id = document.getElementById('edId').value || 'm_' + Date.now();
  
  let inList = [];
  document.querySelectorAll('.mem-chk:checked').forEach(cb => inList.push(cb.value));
  let ext = document.getElementById('edExt').value.trim();
  let pStr = `[내부] ${inList.join(', ')} | [외부] ${ext}`;
  
  const mData = {
    id: id,
    date: document.getElementById('edDate').value,
    project_id: document.getElementById('edProj').value,
    title: document.getElementById('edTitle').value.trim(),
    participants: pStr,
    note: document.getElementById('edNote').value.replace(/\n/g, '↵'),
    actions: document.getElementById('edActions').value.replace(/\n/g, '↵'),
    transcript: document.getElementById('edTrans').value.replace(/\n/g, '↵')
  };

  if(!mData.title) { alert('회의 제목을 입력해주세요.'); return; }

  const idx = meetings.findIndex(x => String(x.id||x.ID) === String(id));
  if(idx > -1) meetings[idx] = mData;
  else meetings.push(mData);

  closeEditor(); 
  renderList();
  
  commitToCloud();
}

function deleteMeeting() {
  const id = document.getElementById('edId').value;
  if(!id) { closeEditor(); return; }
  if(confirm("이 회의 기록을 완전히 삭제하시겠습니까? (전문 포함)")) {
    meetings = meetings.filter(x => String(x.id||x.ID) !== String(id));
    closeEditor(); 
    renderList(); 
    commitToCloud();
  }
}

/* --- Abyssal Rise Transcript Logic --- */
function openTranscript() { document.getElementById('transModal').classList.add('active'); }
function closeTranscript() { document.getElementById('transModal').classList.remove('active'); document.getElementById('frPopup').classList.remove('active'); }

function toggleFindReplace() {
  document.getElementById('frPopup').classList.toggle('active');
}

function replaceTrans(all) {
  const f = document.getElementById('fndStr').value;
  const r = document.getElementById('repStr').value;
  if(!f) return;
  const ta = document.getElementById('edTrans');
  if(all) {
    ta.value = ta.value.split(f).join(r);
    showToast(`모든 '${f}' 단어를 변경했습니다.`);
  } else {
    ta.value = ta.value.replace(f, r);
    showToast(`단어를 변경했습니다.`);
  }
}

/* --- Sync & Toast --- */
function commitToCloud() {
  if(window.isSaving) return;
  
  // [수술 2] 할 일(todos) 모듈에서 대성공했던 'Safe Mapping' 필터 이식
  // 시트의 헤더가 미세하게 틀려도 강제로 규격에 맞춰 DB 쓰기 증발을 원천 차단합니다.
  const safeMeetings = meetings.map(m => ({
    id: m.id || m.ID || '',
    date: m.date || m.Date || '',
    project_id: m.project_id || m.Project_id || m['Project ID'] || '',
    title: m.title || m.Title || '',
    participants: m.participants || m.Participants || '',
    note: m.note || m.Note || '',
    actions: m.actions || m.Actions || '',
    transcript: m.transcript || m.Transcript || ''
  }));

  const payload = { action: 'write', sheetName: 'meetings', data: safeMeetings };
  document.getElementById('payload_input').value = JSON.stringify(payload);
  
  window.isSaving = true;
  document.getElementById('syncDot').className = 'w-2 h-2 rounded-full bg-blue-500 animate-ping';
  document.getElementById('syncStatus').innerHTML = `<div class="w-2 h-2 rounded-full bg-blue-500 animate-ping"></div> 동기화 중...`;
  
  document.getElementById('hidden_form').action = A_URL;
  document.getElementById('hidden_form').submit();
}

function onSaveSuccess() {
  window.isSaving = false;
  document.getElementById('syncDot').className = 'w-2 h-2 rounded-full bg-emerald-500';
  document.getElementById('syncStatus').innerHTML = `<div class="w-2 h-2 rounded-full bg-emerald-500"></div> 시스템 준비 완료`;
  showToast("모든 데이터가 DB에 완벽히 동기화되었습니다.");
}

function showToast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
